<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #ffffff; display: flex; justify-content: center; align-items: flex-start; height: 100vh; overflow: hidden; }
        .piano { display: flex; position: relative; padding: 0; margin-top: 5px; }
        .key { border: 1px solid #000; box-sizing: border-box; cursor: pointer; transition: all 0.1s; position: relative; }
        
        .white { width: 50px; height: 160px; background: white; border-radius: 0 0 5px 5px; z-index: 1; }
        .white.active { background: #00d4ff; box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.7); }
        
        .black { width: 34px; height: 100px; background: #111 !important; margin-left: -17px; margin-right: -17px; z-index: 2; border-radius: 0 0 3px 3px; }
        .black.active { background: #ff007f !important; box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.7); }

        .label { position: absolute; bottom: 12px; width: 100%; text-align: center; font-size: 14px; font-weight: bold; color: #888; pointer-events: none; }

        @media screen and (orientation: landscape) {
            .white { height: 110px; } .black { height: 70px; }
            .label { font-size: 12px; bottom: 8px; }
        }
    </style>
</head>
<body>
<div class="piano">
    <div class="key white" data-note="C4"><span class="label">C</span></div>
    <div class="key black" data-note="C#4"></div>
    <div class="key white" data-note="D4"><span class="label">D</span></div>
    <div class="key black" data-note="D#4"></div>
    <div class="key white" data-note="E4"><span class="label">E</span></div>
    <div class="key white" data-note="F4"><span class="label">F</span></div>
    <div class="key black" data-note="F#4"></div>
    <div class="key white" data-note="G4"><span class="label">G</span></div>
    <div class="key black" data-note="G#4"></div>
    <div class="key white" data-note="A4"><span class="label">A</span></div>
    <div class="key black" data-note="A#4"></div>
    <div class="key white" data-note="B4"><span class="label">B</span></div>
</div>

<script>
    const keys = document.querySelectorAll('.key');
    let audioCtx;
    const freqMap = { "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88 };

    function playPianoNote(frequency) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const now = audioCtx.currentTime;
        const gainNode = audioCtx.createGain();
        gainNode.connect(audioCtx.destination);

        [ {type: 'sine', vol: 0.15}, {type: 'triangle', vol: 0.1} ].forEach(config => {
            const osc = audioCtx.createOscillator();
            osc.type = config.type;
            osc.frequency.setValueAtTime(frequency, now);
            osc.connect(gainNode);
            osc.start();
            osc.stop(now + 0.8); // Shortened total run time
        });

        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.3, now + 0.01); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.6); // FASTER SUSTAIN DECAY (from 1.2 to 0.6)
    }

    keys.forEach(k => {
        const start = (e) => { 
            e.preventDefault(); 
            if(!k.classList.contains('active')) {
                k.classList.add('active'); 
                playPianoNote(freqMap[k.dataset.note]); 
            }
        };
        const end = () => k.classList.remove('active');
        k.addEventListener('mousedown', start);
        k.addEventListener('touchstart', start, {passive: false});
        ['mouseup', 'mouseleave', 'touchend'].forEach(e => k.addEventListener(e, end));
    });
</script>
</body>
</html>
